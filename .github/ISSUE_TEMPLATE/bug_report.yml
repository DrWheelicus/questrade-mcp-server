name: Bug report
description: Report a defect or regression
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide as much detail as possible.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the problem clearly.
      placeholder: A concise description of the bug.
    validations:
      required: true
  - type: dropdown
    id: transport
    attributes:
      label: Transport
      description: Which transport were you using?
      options:
        - stdio
        - http
        - unknown
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: OS
      placeholder: "Windows 11 / macOS 14 / Ubuntu 24.04"
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node.js version
      placeholder: "v22.x"
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Project version or commit
      placeholder: "v0.1.0 or commit SHA"
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: List the exact steps so we can reproduce the issue.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include relevant errors and logs (with secrets removed).
      placeholder: What happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal repro (optional)
      description: Share the smallest config/input that reproduces the issue.
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Add screenshots, links, or related issues.
